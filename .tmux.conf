# ============================================
# tmux 简约实用配置
# ============================================

# ----- 基础设置 -----
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0

# ----- 前缀键 -----
# 保持 Ctrl-b，但添加 Ctrl-a 作为辅助前缀
set -g prefix C-b

# ----- 状态栏 -----
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# 状态栏样式
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# 左侧: session 名
set -g status-left-length 30
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold]  #S #[default] "

# 右侧: CPU / 内存 / 日期时间
set -g status-right-length 60
set -g status-right "#[fg=#a6adc8]#(top -bn1 | grep 'Cpu(s)' | awk '{printf \"CPU %.0f%%\", $2+$4}')  #[fg=#a6adc8]#(free -m | awk '/Mem/{printf \"MEM %.0f%%\", $3/$2*100}')  #[fg=#f9e2af,bold]%m-%d %H:%M "

# 窗口列表样式
setw -g window-status-format "#[fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[fg=#cba6f7,bold] #I:#W "
setw -g window-status-separator ""

# ----- 面板边框 -----
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# ----- 消息样式 -----
set -g message-style "bg=#1e1e2e,fg=#cdd6f4"

# ----- 快捷键 -----
# r 键重载配置
bind r source-file ~/.tmux.conf \; display "配置已重载"

# 更直观的分屏: | 分割垂直，- 分割水平
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim 风格面板切换
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 面板大小调整 (前缀 + Ctrl+hjkl)
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# 新窗口使用当前路径
bind c new-window -c "#{pane_current_path}"
